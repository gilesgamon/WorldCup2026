<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - Tournament Wheel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            position: absolute;
            top: 20px;
            text-align: center;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .controls {
            position: absolute;
            top: 70px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #wheelContainer {
            position: relative;
            width: min(95vw, 95vh);
            height: min(95vw, 95vh);
            max-width: 800px;
            max-height: 800px;
        }

        svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .center-trophy {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3), transparent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
            overflow: hidden;
        }

        /* Empty "?" placeholder in the centre until the champion is decided. */
        .center-trophy.pending {
            border: 2px dashed rgba(255, 215, 0, 0.5);
        }

        .center-trophy .champion-q {
            font-size: 0.6em;
            font-weight: bold;
            opacity: 0.7;
        }

        /* Champion decided: show their flag filling the centre circle. */
        .center-trophy img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #FFD700;
        }

        .center-trophy.decided {
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
        }

        .team-flag {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            transform: translate(-50%, -50%);
            overflow: hidden;
        }

        .team-flag:hover {
            transform: translate(-50%, -50%) scale(1.3);
            border-color: #FFD700;
            z-index: 50;
        }

        .team-flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .team-flag.winner {
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.5);
        }

        .team-flag.eliminated {
            opacity: 0.3;
            filter: grayscale(100%);
        }

        .team-flag.tbd {
            background: rgba(255, 255, 255, 0.05);
            border-style: dashed;
            border-color: rgba(255, 255, 255, 0.25);
        }

        .match-time {
            position: absolute;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            pointer-events: none;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .match-time .date {
            font-size: inherit;
            line-height: 1.1;
        }

        .match-time .time {
            font-size: inherit;
            font-weight: 600;
            line-height: 1.1;
        }

        @media (max-width: 768px) {
            .match-time {
                font-size: 9px;
                padding: 2px 5px;
                max-width: 80px;
            }
        }

        .match-time.live {
            color: #4ade80;
            border-color: #4ade80;
            background: rgba(0, 0, 0, 0.95);
            font-weight: 600;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0%, 100% {
                box-shadow: 0 0 8px rgba(74, 222, 128, 0.3);
            }
            50% {
                box-shadow: 0 0 15px rgba(74, 222, 128, 0.6);
            }
        }

        .match-time .score {
            font-size: 13px;
            font-weight: bold;
            color: #FFD700;
            margin: 2px 0;
        }

        .match-time .status {
            font-size: 10px;
            opacity: 0.9;
        }

        .bracket-line {
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 1.5;
            fill: none;
        }

        .bracket-line.active {
            stroke: rgba(74, 222, 128, 0.6);
            stroke-width: 2;
        }

        .timezone-selector {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
        }

        .timezone-selector label {
            font-size: 12px;
            opacity: 0.8;
        }

        .timezone-selector select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            color: white;
            padding: 6px 10px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .timezone-selector select:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .timezone-selector select option {
            background: #1a1a1a;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.95);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 200;
            white-space: nowrap;
        }

        /* Full-screen error: joke on one side, the underlying technical detail on
           the other. Stacks vertically on narrow screens. */
        .error-split {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: stretch;
            justify-content: center;
            max-width: 720px;
            margin: 0 auto;
            text-align: left;
        }

        .error-split .error-joke,
        .error-split .error-underlying {
            flex: 1 1 260px;
            min-width: 240px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 18px 20px;
        }

        .error-split .error-underlying {
            background: rgba(255, 255, 255, 0.02);
        }

        .error-split .error-emoji {
            font-size: 2.2em;
            margin-bottom: 8px;
        }

        .error-split h3 {
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .error-split .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.5;
            margin-bottom: 8px;
        }

        .error-split code {
            background: rgba(255, 255, 255, 0.1);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .error-split .detail-line {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 6px;
        }

        /* Non-blocking banner shown over stale cached data during an outage. */
        .outage-banner {
            position: fixed;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: min(92vw, 640px);
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 20, 0, 0.92);
            border: 1px solid rgba(255, 200, 80, 0.35);
            border-radius: 10px;
            padding: 10px 14px;
            z-index: 300;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
        }

        .outage-banner .ob-joke {
            flex: 1 1 220px;
            min-width: 200px;
            font-size: 13px;
        }

        .outage-banner .ob-joke .ob-headline {
            font-weight: 600;
        }

        .outage-banner .ob-underlying {
            flex: 1 1 200px;
            min-width: 180px;
            font-size: 11px;
            opacity: 0.75;
            text-align: right;
        }

        .outage-banner .ob-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .outage-banner .ob-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            cursor: pointer;
            line-height: 1;
            padding: 0 4px;
        }

        @media (max-width: 600px) {
            .outage-banner .ob-underlying {
                text-align: left;
            }
        }

        .canada-timer {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            min-width: 180px;
            z-index: 100;
        }

        .canada-timer .timer-header {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.9;
            text-align: center;
        }

        .canada-timer .timer-subtitle {
            font-size: 10px;
            opacity: 0.6;
            text-align: center;
            margin-bottom: 8px;
        }

        .canada-timer .timer-match {
            font-size: 12px;
            padding: 6px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .canada-timer .match-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        /* Right-hand column: date on top, kickoff time directly beneath it. Uses a
           dedicated class name so it doesn't inherit the wheel's global (absolutely
           positioned) .match-time styles, which made the time float. */
        .canada-timer .match-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 3px;
            white-space: nowrap;
        }

        .canada-timer .match-kickoff {
            font-size: 11px;
            opacity: 0.7;
        }

        .canada-timer .timer-match:first-of-type {
            border-top: none;
        }

        .canada-timer .match-teams {
            flex: 1;
            opacity: 0.8;
        }

        .canada-timer .match-when {
            font-weight: 600;
            font-size: 11px;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            white-space: nowrap;
        }

        .canada-timer .match-when.today {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.15);
        }

        .canada-timer .match-when.tomorrow {
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.15);
        }

        .canada-timer .match-when.live {
            color: #f87171;
            background: rgba(248, 113, 113, 0.18);
            animation: pulse-border 2s infinite;
        }

        .canada-timer .timer-match.live .match-teams {
            opacity: 1;
            font-weight: 700;
            color: #FFD700;
        }

        .canada-timer .timer-match.live .match-kickoff {
            color: #4ade80;
            opacity: 1;
            font-weight: 600;
        }

        .canada-timer .no-matches {
            font-size: 11px;
            opacity: 0.6;
            text-align: center;
            padding: 4px 0;
        }

        @media (max-width: 768px) {
            .canada-timer {
                top: 10px;
                right: 10px;
                min-width: 160px;
                padding: 10px 12px;
            }
            
            .canada-timer .timer-header {
                font-size: 12px;
            }
            
            .canada-timer .timer-match {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="canada-timer" id="canadaTimer">
        <div class="timer-header">⚽ Next Game</div>
        <div id="canadaMatches"></div>
    </div>

    <div class="header">
        <h1>🏆 FIFA World Cup 2026</h1>
        <div style="font-size: 0.8em; opacity: 0.5; margin-top: 5px;">v1.6.9</div>
    </div>

    <div class="timezone-selector">
        <label>🌍 Timezone:</label>
        <select id="timezoneSelect" onchange="onTimezoneChange()">
            <option value="auto">Auto-detect</option>
            <optgroup label="Americas">
                <option value="America/Los_Angeles">Pacific Time (PT)</option>
                <option value="America/Denver">Mountain Time (MT)</option>
                <option value="America/Chicago">Central Time (CT)</option>
                <option value="America/New_York">Eastern Time (ET)</option>
                <option value="America/Halifax">Atlantic Time (AT)</option>
                <option value="America/Sao_Paulo">São Paulo (BRT)</option>
                <option value="America/Argentina/Buenos_Aires">Buenos Aires (ART)</option>
                <option value="America/Mexico_City">Mexico City (CST)</option>
            </optgroup>
            <optgroup label="Europe">
                <option value="Europe/London">London (GMT/BST)</option>
                <option value="Europe/Paris">Paris (CET/CEST)</option>
                <option value="Europe/Berlin">Berlin (CET/CEST)</option>
                <option value="Europe/Madrid">Madrid (CET/CEST)</option>
                <option value="Europe/Rome">Rome (CET/CEST)</option>
                <option value="Europe/Istanbul">Istanbul (TRT)</option>
                <option value="Europe/Moscow">Moscow (MSK)</option>
            </optgroup>
            <optgroup label="Asia">
                <option value="Asia/Dubai">Dubai (GST)</option>
                <option value="Asia/Kolkata">India (IST)</option>
                <option value="Asia/Bangkok">Bangkok (ICT)</option>
                <option value="Asia/Shanghai">China (CST)</option>
                <option value="Asia/Tokyo">Tokyo (JST)</option>
                <option value="Asia/Seoul">Seoul (KST)</option>
            </optgroup>
            <optgroup label="Pacific">
                <option value="Australia/Sydney">Sydney (AEDT/AEST)</option>
                <option value="Australia/Melbourne">Melbourne (AEDT/AEST)</option>
                <option value="Pacific/Auckland">Auckland (NZDT/NZST)</option>
            </optgroup>
            <optgroup label="Africa">
                <option value="Africa/Cairo">Cairo (EET)</option>
                <option value="Africa/Lagos">Lagos (WAT)</option>
                <option value="Africa/Johannesburg">Johannesburg (SAST)</option>
            </optgroup>
        </select>
        <span style="font-size: 10px; opacity: 0.6; margin-left: 8px;">Kickoff times converted from each stadium's local time</span>
    </div>

    <div class="controls">
        <button class="btn" onclick="refreshData()">🔄 Refresh</button>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>Loading tournament data...</div>
    </div>

    <div id="wheelContainer" style="display: none;">
        <svg id="bracketSvg"></svg>
        <div class="center-trophy pending" id="centerChampion"><span class="champion-q">?</span></div>
        <div id="teamFlags"></div>
        <div id="matchTimes"></div>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script>
        const API_BASE = 'https://worldcup26.ir';
        let allMatches = [], allTeams = [];
        let selectedTimezone = 'auto'; // Store the selected timezone

        // --- Polling / resilience state ---
        const CACHE_KEY = 'wc2026_cache_v1';
        const POLL_BASE_MS = 60000;          // normal refresh cadence
        const POLL_MAX_MS = 10 * 60000;      // cap the backoff at 10 minutes
        let consecutiveFailures = 0;         // drives exponential backoff
        let pollTimeout = null;              // handle for the next scheduled poll
        let isFetching = false;              // guard against overlapping fetches
        let bannerDismissed = false;         // user closed the outage banner

        function loadCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const data = JSON.parse(raw);
                if (data && Array.isArray(data.games) && Array.isArray(data.teams)) {
                    return data;
                }
            } catch (e) { /* ignore corrupt/unavailable storage */ }
            return null;
        }

        function saveCache(games, teams) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    games, teams, savedAt: Date.now()
                }));
            } catch (e) { /* storage may be full or blocked; non-fatal */ }
        }

        function timeAgo(ts) {
            if (!ts) return 'an unknown time ago';
            const s = Math.max(0, Math.floor((Date.now() - ts) / 1000));
            if (s < 60) return `${s}s ago`;
            const m = Math.floor(s / 60);
            if (m < 60) return `${m} min ago`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h} hr ago`;
            return `${Math.floor(h / 24)} day(s) ago`;
        }

        // Pre-calculated positions for clean bracket layout
        // Rotated so semi-finals are horizontal (0° and 180°)
        const KNOCKOUT_POSITIONS = {
            r32: [
                // 16 matches, 32 teams - outer ring (rotated 90° clockwise)
                {angle: 11.25}, {angle: 33.75}, {angle: 56.25}, {angle: 78.75},
                {angle: 101.25}, {angle: 123.75}, {angle: 146.25}, {angle: 168.75},
                {angle: 191.25}, {angle: 213.75}, {angle: 236.25}, {angle: 258.75},
                {angle: 281.25}, {angle: 303.75}, {angle: 326.25}, {angle: 348.75}
            ],
            r16: [
                // 8 matches - second ring (rotated 90° clockwise)
                {angle: 22.5}, {angle: 67.5}, {angle: 112.5}, {angle: 157.5},
                {angle: 202.5}, {angle: 247.5}, {angle: 292.5}, {angle: 337.5}
            ],
            qf: [
                // 4 matches - third ring (rotated 90° clockwise)
                {angle: 45}, {angle: 135}, {angle: 225}, {angle: 315}
            ],
            sf: [
                // 2 matches - inner ring (horizontal: 90° = right, 270° = left after -90 offset)
                {angle: 90}, {angle: 270}
            ]
        };

        // The API's `local_date` is the STADIUM's local (wall-clock) kickoff time,
        // NOT a single fixed timezone. The 2026 World Cup spans several time zones
        // across the US, Canada and Mexico, so each venue must be converted from its
        // own IANA timezone. (Note: the API's "region" field — Central/Eastern/Western
        // — is a broadcast grouping, not a timezone: e.g. Dallas and Mexico City are
        // both "Central" but Dallas is UTC-5 in June while Mexico City is UTC-6.)
        // Keyed by stadium_id (1-16) from the official schedule.
        const STADIUM_TIMEZONES = {
            '1':  'America/Mexico_City',   // Estadio Azteca - Mexico City
            '2':  'America/Mexico_City',   // Estadio Akron - Guadalajara
            '3':  'America/Monterrey',     // Estadio BBVA - Monterrey
            '4':  'America/Chicago',       // AT&T Stadium - Dallas
            '5':  'America/Chicago',       // NRG Stadium - Houston
            '6':  'America/Chicago',       // Arrowhead Stadium - Kansas City
            '7':  'America/New_York',      // Mercedes-Benz Stadium - Atlanta
            '8':  'America/New_York',      // Hard Rock Stadium - Miami
            '9':  'America/New_York',      // Gillette Stadium - Boston
            '10': 'America/New_York',      // Lincoln Financial Field - Philadelphia
            '11': 'America/New_York',      // MetLife Stadium - New York/New Jersey
            '12': 'America/Toronto',       // BMO Field - Toronto
            '13': 'America/Vancouver',     // BC Place - Vancouver
            '14': 'America/Los_Angeles',   // Lumen Field - Seattle
            '15': 'America/Los_Angeles',   // Levi's Stadium - San Francisco Bay Area
            '16': 'America/Los_Angeles'    // SoFi Stadium - Los Angeles
        };

        // Fallback if a match has an unknown stadium_id. Central US time is a
        // reasonable middle-of-the-map default across the three host countries.
        const DEFAULT_VENUE_TIMEZONE = 'America/Chicago';

        async function fetchData() {
            if (isFetching) return;
            isFetching = true;
            try {
                const [matchesRes, teamsRes] = await Promise.all([
                    fetch(`${API_BASE}/get/games`),
                    fetch(`${API_BASE}/get/teams`)
                ]);

                // The API sometimes returns an error page (e.g. 502 Bad Gateway)
                // instead of JSON. Detect that here so we can show a useful message
                // rather than a generic parse failure.
                if (!matchesRes.ok || !teamsRes.ok) {
                    const status = !matchesRes.ok ? matchesRes.status : teamsRes.status;
                    throw new ApiError(status);
                }

                let matchesData, teamsData;
                try {
                    matchesData = await matchesRes.json();
                    teamsData = await teamsRes.json();
                } catch (parseErr) {
                    // 2xx but body wasn't valid JSON — treat as the API misbehaving.
                    throw new ApiError(matchesRes.status || 0);
                }

                allMatches = matchesData.games || matchesData;
                allTeams = teamsData.teams || teamsData;

                console.log('Loaded:', allMatches.length, 'matches,', allTeams.length, 'teams');

                // Cache the good response so we can keep showing data during outages.
                saveCache(allMatches, allTeams);
                consecutiveFailures = 0;
                bannerDismissed = false;
                hideOutageBanner();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('wheelContainer').style.display = 'block';
                
                renderWheel();
            } catch (error) {
                console.error('Error:', error);
                consecutiveFailures++;
                handleFetchError(error);
            } finally {
                isFetching = false;
                scheduleNextPoll();
            }
        }

        function computePollDelay() {
            if (consecutiveFailures === 0) return POLL_BASE_MS;
            // Exponential backoff: 60s, 120s, 240s ... capped at POLL_MAX_MS.
            const delay = POLL_BASE_MS * Math.pow(2, consecutiveFailures - 1);
            return Math.min(delay, POLL_MAX_MS);
        }

        function scheduleNextPoll() {
            clearTimeout(pollTimeout);
            // Don't poll while the tab is hidden — we resume on visibilitychange.
            if (document.hidden) return;
            pollTimeout = setTimeout(fetchData, computePollDelay());
        }

        // Decide what to show when a fetch fails: if we have cached data, keep the
        // wheel on screen and show a non-blocking banner; otherwise show the full
        // split error screen (joke + underlying detail).
        function handleFetchError(error) {
            const cached = loadCache();

        function pickJoke(error) {
            const status = (error instanceof ApiError) ? error.status : null;
            if (status === 429) {
                return RATE_LIMIT_JOKES[Math.floor(Math.random() * RATE_LIMIT_JOKES.length)];
            }
            return API_DOWN_JOKES[Math.floor(Math.random() * API_DOWN_JOKES.length)];
        }

        // Human-readable explanation of what actually went wrong, for the
        // "underlying" side of the split. Returns { title, lines: [] }.
        function describeUnderlying(error, savedAt) {
            const isApiError = error instanceof ApiError;
            const status = isApiError ? error.status : null;
            const lines = [];

            if (status === 429) {
                lines.push('The API returned <code>429 Too Many Requests</code>.');
                lines.push('Public endpoints allow up to 1000 requests per IP per minute; that limit was hit.');
            } else if (status === 502 || status === 503 || status === 504) {
                lines.push(`The API gateway returned <code>${status}</code>.`);
                lines.push('The upstream World Cup data service is unreachable (a known load issue on their free host).');
            } else if (status >= 500) {
                lines.push(`The API returned <code>${status}</code> (server error).`);
            } else if (status === 401 || status === 403) {
                lines.push(`The API returned <code>${status}</code> (authorization).`);
            } else if (isApiError && status) {
                lines.push(`The API returned <code>HTTP ${status}</code>.`);
            } else {
                lines.push('The live data feed couldn\'t be reached (network error).');
                console.info('Tip: if running locally, serve over HTTP, e.g. `python3 -m http.server 8000`');
            }

            if (savedAt) {
                lines.push(`Showing the last saved data from <strong>${timeAgo(savedAt)}</strong>.`);
            }

            return { status, lines };
        }

        function getTimeZoneOffsetMs(utcDate, timeZone) {
            // Difference (in ms) between the wall-clock time shown in `timeZone`
            // and UTC, for the given instant. Handles DST automatically via Intl.
            const dtf = new Intl.DateTimeFormat('en-US', {
                timeZone,
                hour12: false,
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            const map = {};
            for (const part of dtf.formatToParts(utcDate)) {
                map[part.type] = part.value;
            }
            const hour = map.hour === '24' ? '00' : map.hour; // guard hourCycle quirk
            const asUTC = Date.UTC(
                Number(map.year), Number(map.month) - 1, Number(map.day),
                Number(hour), Number(map.minute), Number(map.second)
            );
            return asUTC - utcDate.getTime();
        }

        function parseMatchDate(dateString, stadiumId) {
            // Parse "06/11/2026 13:00" format.
            // IMPORTANT: `local_date` is the STADIUM's local (wall-clock) kickoff
            // time. Convert it from the venue's own timezone to a correct UTC
            // instant so it can then be re-displayed in the user's chosen timezone.
            const [datePart, timePart] = dateString.split(' ');
            const [month, day, year] = datePart.split('/').map(Number);
            const [hours, minutes] = timePart.split(':').map(Number);

            const timeZone = STADIUM_TIMEZONES[String(stadiumId)] || DEFAULT_VENUE_TIMEZONE;

            // Treat the wall-clock components as if they were UTC, then subtract the
            // venue's offset at that instant to recover the true UTC time.
            const wallAsUtcMs = Date.UTC(year, month - 1, day, hours, minutes, 0);
            const offsetMs = getTimeZoneOffsetMs(new Date(wallAsUtcMs), timeZone);
            return new Date(wallAsUtcMs - offsetMs);
        }

        function getUserTimezone() {
            if (selectedTimezone === 'auto') {
                try {
                    return Intl.DateTimeFormat().resolvedOptions().timeZone;
                } catch (e) {
                    return 'UTC';
                }
            }
            return selectedTimezone;
        }

        function formatMatchTime(dateString, stadiumId) {
            try {
                const date = parseMatchDate(dateString, stadiumId);
                const timezone = getUserTimezone();
                
                const options = { 
                    month: 'short', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    timeZone: timezone
                };
                
                return date.toLocaleString('en-US', options);
            } catch (e) {
                console.error('Error formatting time:', e);
                return dateString;
            }
        }

        function formatMatchTimeParts(dateString, stadiumId) {
            // Return the date and time as separate, compact strings so the label
            // can be stacked on two short lines (much narrower than one long line,
            // which greatly reduces overlap on small screens).
            try {
                const date = parseMatchDate(dateString, stadiumId);
                const timezone = getUserTimezone();

                const dateStr = date.toLocaleString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    timeZone: timezone
                });
                const timeStr = date.toLocaleString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    timeZone: timezone
                });

                return { dateStr, timeStr };
            } catch (e) {
                console.error('Error formatting time:', e);
                return { dateStr: dateString, timeStr: '' };
            }
        }

        // Build the knockout bracket order deterministically from the API's
        // "Winner Match N" feeder labels (e.g. r16 match 90 is fed by "Winner
        // Match 73" and "Winner Match 75"). A depth-first walk from the final down
        // to the R32 leaves yields, for each ring, the matches in correct
        // left-to-right bracket order — independent of which results are in.
        // Returns { r32, r16, qf, sf } arrays, or null if the structure can't be
        // resolved (in which case the caller falls back to the heuristic).
        function orderKnockoutByBracket(matches) {
            const byId = {};
            matches.forEach(m => { byId[String(m.id)] = m; });

            const feederIds = (m) => {
                const re = /Match\s+(\d+)/i;
                const h = (m.home_team_label || '').match(re);
                const a = (m.away_team_label || '').match(re);
                return [h ? h[1] : null, a ? a[1] : null];
            };

            const rounds = { r32: [], r16: [], qf: [], sf: [] };
            let ok = true;

            const visit = (id, depth) => {
                if (depth > 8) { ok = false; return; } // guard against bad/cyclic data
                const m = byId[String(id)];
                if (!m) { ok = false; return; }
                if (m.type === 'r32') { rounds.r32.push(m); return; }
                const [h, a] = feederIds(m);
                if (!h || !a) { ok = false; return; }
                visit(h, depth + 1);
                visit(a, depth + 1);
                if (rounds[m.type]) rounds[m.type].push(m);
            };

            const finalMatch = matches.find(m => m.type === 'final');
            if (!finalMatch) return null;
            visit(finalMatch.id, 0);

            if (!ok) return null;

            // Only trust the deterministic order if every ring is fully populated to
            // match the fixed position slots; otherwise defer to the fallback.
            const expected = { r32: 16, r16: 8, qf: 4, sf: 2 };
            for (const round of Object.keys(expected)) {
                if (rounds[round].length !== expected[round]) return null;
            }
            return rounds;
        }

        function updateCanadaTimer() {
            const container = document.getElementById('canadaMatches');
            if (!container) return;

            // Check for any live match first
            const liveMatch = allMatches.find(m =>
                m.time_elapsed !== 'notstarted' &&
                m.time_elapsed !== 'finished' &&
                m.finished !== 'TRUE'
            );

            // If there's a live match, show it
            if (liveMatch) {
                const team1 = allTeams.find(t => t.id === liveMatch.home_team_id);
                const team2 = allTeams.find(t => t.id === liveMatch.away_team_id);
                
                const team1Name = team1 ? (team1.fifa_code || team1.name_en?.substring(0, 3).toUpperCase()) : 'TBD';
                const team2Name = team2 ? (team2.fifa_code || team2.name_en?.substring(0, 3).toUpperCase()) : 'TBD';
                
                const scoreLine = `${team1Name} ${liveMatch.home_score} - ${liveMatch.away_score} ${team2Name}`;
                const elapsedRaw = String(liveMatch.time_elapsed);
                const elapsed = /^\d+$/.test(elapsedRaw) ? `${elapsedRaw}'` : elapsedRaw;
                
                container.innerHTML = `
                    <div class="timer-match live">
                        <div class="match-row">
                            <div class="match-teams">${scoreLine}</div>
                            <div class="match-meta">
                                <span class="match-when live">🔴 LIVE</span>
                                <span class="match-kickoff">${elapsed}</span>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            // No live match, find the next upcoming match
            const upcomingMatches = allMatches
                .filter(m =>
                    m.finished !== 'TRUE' &&
                    m.time_elapsed === 'notstarted'
                )
                .map(m => {
                    try {
                        const matchDate = parseMatchDate(m.local_date, m.stadium_id);
                        return { ...m, parsedDate: matchDate };
                    } catch (e) {
                        return null;
                    }
                })
                .filter(m => m !== null)
                .sort((a, b) => a.parsedDate - b.parsedDate);

            if (upcomingMatches.length === 0) {
                container.innerHTML = '<div class="no-matches">No upcoming matches</div>';
                return;
            }

            // Show only the next match
            const nextMatch = upcomingMatches[0];
            const userTz = getUserTimezone();

            // Return the calendar date (as a UTC-midnight timestamp) that a given
            // instant falls on *in the user's timezone*. Comparing these gives a
            // reliable whole-day difference, so Today/Tomorrow labels are correct
            // regardless of timezone offsets.
            const dayNumberInTz = (date, tz) => {
                const p = new Intl.DateTimeFormat('en-CA', {
                    timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit'
                }).formatToParts(date);
                const get = t => Number(p.find(x => x.type === t).value);
                return Date.UTC(get('year'), get('month') - 1, get('day'));
            };
            const todayNum = dayNumberInTz(new Date(), userTz);

            const team1 = allTeams.find(t => t.id === nextMatch.home_team_id);
            const team2 = allTeams.find(t => t.id === nextMatch.away_team_id);
            
            const team1Name = team1 ? (team1.fifa_code || team1.name_en?.substring(0, 3).toUpperCase()) : 'TBD';
            const team2Name = team2 ? (team2.fifa_code || team2.name_en?.substring(0, 3).toUpperCase()) : 'TBD';
            
            const teams = `${team1Name} vs ${team2Name}`;
            
            // Format the match time in user's timezone
            const matchTimeStr = nextMatch.parsedDate.toLocaleString('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                timeZone: userTz
            });
            
            // Whole-day difference between the match date and today, both taken
            // in the user's timezone.
            const dayDiff = Math.round(
                (dayNumberInTz(nextMatch.parsedDate, userTz) - todayNum) / 86400000
            );

            let whenLabel = '';
            let whenClass = '';

            if (dayDiff === 0) {
                whenLabel = 'Today';
                whenClass = 'today';
            } else if (dayDiff === 1) {
                whenLabel = 'Tomorrow';
                whenClass = 'tomorrow';
            } else {
                // For matches beyond tomorrow, show the date.
                whenLabel = nextMatch.parsedDate.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    timeZone: userTz
                });
                whenClass = '';
            }
            
            container.innerHTML = `
                <div class="timer-match">
                    <div class="match-row">
                        <div class="match-teams">${teams}</div>
                        <div class="match-meta">
                            <span class="match-when ${whenClass}">${whenLabel}</span>
                            <span class="match-kickoff">${matchTimeStr}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderWheel() {
            const container = document.getElementById('wheelContainer');
            const size = container.clientWidth;
            const center = size / 2;

            const svg = document.getElementById('bracketSvg');
            const flagsContainer = document.getElementById('teamFlags');
            const timesContainer = document.getElementById('matchTimes');
            
            svg.innerHTML = '';
            flagsContainer.innerHTML = '';
            timesContainer.innerHTML = '';
            svg.setAttribute('viewBox', `0 0 ${size} ${size}`);

            // Radii for each round
            const radii = {
                r32: size * 0.42,
                r16: size * 0.32,
                qf: size * 0.22,
                sf: size * 0.12
            };

            const teamOffset = size * 0.05; // How far teams are from match points

            // Draw each knockout round.
            // Preferred: derive the bracket order deterministically from the API's
            // explicit "Winner Match N" feeder labels, so every match always sits
            // in its correct, stable bracket slot regardless of which results are in.
            // Fallback: the older results-based heuristic (used only if the labels
            // are missing/unparseable).
            let reorderedByRound = orderKnockoutByBracket(allMatches);

            if (!reorderedByRound) {
            reorderedByRound = {};
            
            ['r32', 'r16', 'qf', 'sf'].forEach((roundType, roundIdx) => {
                let matches = allMatches
                    .filter(m => m.type === roundType)
                    .sort((a, b) => parseInt(a.id) - parseInt(b.id));
                
                // Special handling for R32: reorder to group by R16 destination (seed the cascade)
                if (roundType === 'r32') {
                    const r16Matches = allMatches
                        .filter(m => m.type === 'r16')
                        .sort((a, b) => parseInt(a.id) - parseInt(b.id));
                    
                    // Group R32 matches by which R16 match they feed
                    const reordered = [];
                    r16Matches.forEach(r16Match => {
                        const feeding = matches.filter(r32Match => 
                            r32Match.finished === 'TRUE' && (
                                [r16Match.home_team_id, r16Match.away_team_id].includes(r32Match.home_team_id) ||
                                [r16Match.home_team_id, r16Match.away_team_id].includes(r32Match.away_team_id)
                            )
                        );
                        reordered.push(...feeding);
                    });
                    
                    // Add any remaining R32 matches not yet placed
                    matches.forEach(m => {
                        if (!reordered.find(r => r.id === m.id)) {
                            reordered.push(m);
                        }
                    });
                    
                    matches = reordered;
                } else if (roundIdx > 0) {
                    // Reorder this round based on previous round's grouping
                    const prevRoundType = ['r32', 'r16', 'qf', 'sf'][roundIdx - 1];
                    const prevRoundMatches = reorderedByRound[prevRoundType] || [];
                    
                    const reordered = [];
                    const matchesPerGroup = 2; // 2 prev matches per current match
                    
                    // Group previous round matches in pairs, find which current match they feed
                    for (let i = 0; i < prevRoundMatches.length; i += matchesPerGroup) {
                        const groupMatches = prevRoundMatches.slice(i, i + matchesPerGroup);
                        
                        // Find the current round match that these feed into
                        const targetMatch = matches.find(currMatch => 
                            groupMatches.some(prevMatch => 
                                prevMatch.finished === 'TRUE' && (
                                    [currMatch.home_team_id, currMatch.away_team_id].includes(prevMatch.home_team_id) ||
                                    [currMatch.home_team_id, currMatch.away_team_id].includes(prevMatch.away_team_id)
                                )
                            )
                        );
                        
                        if (targetMatch && !reordered.find(r => r.id === targetMatch.id)) {
                            reordered.push(targetMatch);
                        }
                    }
                    
                    // Add any remaining matches not yet placed
                    matches.forEach(m => {
                        if (!reordered.find(r => r.id === m.id)) {
                            reordered.push(m);
                        }
                    });
                    
                    matches = reordered;
                }
                
                reorderedByRound[roundType] = matches;
            });
            }
            
            // Second pass: render using the reordered matches
            ['r32', 'r16', 'qf', 'sf'].forEach((roundType, roundIdx) => {
                const matches = reorderedByRound[roundType];
                
                const positions = KNOCKOUT_POSITIONS[roundType];
                const radius = radii[roundType];

                matches.forEach((match, matchIdx) => {
                    if (matchIdx >= positions.length) return;

                    const pos = positions[matchIdx];
                    const angleRad = (pos.angle - 90) * Math.PI / 180;
                    
                    // Match point position
                    const mx = center + radius * Math.cos(angleRad);
                    const my = center + radius * Math.sin(angleRad);

                    // Team positions (slightly further out)
                    const teamRadius = radius + teamOffset;
                    const team1Angle = angleRad - 0.08;
                    const team2Angle = angleRad + 0.08;
                    
                    const t1x = center + teamRadius * Math.cos(team1Angle);
                    const t1y = center + teamRadius * Math.sin(team1Angle);
                    const t2x = center + teamRadius * Math.cos(team2Angle);
                    const t2y = center + teamRadius * Math.sin(team2Angle);

                    const finished = match.finished === 'TRUE';

                    // Draw lines from teams to match point
                    drawLine(svg, t1x, t1y, mx, my, finished);
                    drawLine(svg, t2x, t2y, mx, my, finished);

                    // Draw line to next round - Find this match in next round by ID
                    if (roundIdx < 3 && finished) {
                        const nextRoundType = ['r32', 'r16', 'qf', 'sf'][roundIdx + 1];
                        const nextRoundMatches = reorderedByRound[nextRoundType];
                        
                        // Find which next-round match contains a team from this match
                        const nextMatch = nextRoundMatches.find(nm => 
                            [nm.home_team_id, nm.away_team_id].includes(match.home_team_id) ||
                            [nm.home_team_id, nm.away_team_id].includes(match.away_team_id)
                        );
                        
                        if (nextMatch) {
                            const nextMatchIdx = nextRoundMatches.indexOf(nextMatch);
                            if (nextMatchIdx >= 0 && nextMatchIdx < KNOCKOUT_POSITIONS[nextRoundType].length) {
                                const nextRadius = radii[nextRoundType];
                                const nextPos = KNOCKOUT_POSITIONS[nextRoundType][nextMatchIdx];
                                const nextAngleRad = (nextPos.angle - 90) * Math.PI / 180;
                                const nx = center + nextRadius * Math.cos(nextAngleRad);
                                const ny = center + nextRadius * Math.sin(nextAngleRad);
                                
                                drawLine(svg, mx, my, nx, ny, finished);
                            }
                        }
                    } else if (roundIdx === 3) {
                        // Semi-finals connect to center
                        drawLine(svg, mx, my, center, center, finished);
                    }

                    // Create team flags - place teams where they actually appear in THIS match
                    const team1 = allTeams.find(t => t.id === match.home_team_id);
                    const team2 = allTeams.find(t => t.id === match.away_team_id);

                    if (team1) {
                        createFlag(flagsContainer, team1, t1x, t1y, match, 'home');
                    } else {
                        // Team not decided yet: show a placeholder with its feeder
                        // label (e.g. "Winner Match 87") so the slot is identifiable.
                        createTBDFlag(flagsContainer, match.home_team_label, t1x, t1y);
                    }
                    if (team2) {
                        createFlag(flagsContainer, team2, t2x, t2y, match, 'away');
                    } else {
                        createTBDFlag(flagsContainer, match.away_team_label, t2x, t2y);
                    }

                    // Show match time if not yet finished
                    if (match.finished === 'FALSE' && match.time_elapsed !== 'finished') {
                        const timeDiv = document.createElement('div');
                        timeDiv.className = 'match-time';
                        
                        // Check if match is live
                        const isLive = match.time_elapsed !== 'notstarted';
                        
                        if (isLive) {
                            // Live match - show score
                            timeDiv.classList.add('live');
                            
                            const team1 = allTeams.find(t => t.id === match.home_team_id);
                            const team2 = allTeams.find(t => t.id === match.away_team_id);
                            const team1Code = team1 ? (team1.fifa_code || team1.name_en?.substring(0, 3).toUpperCase()) : 'TBD';
                            const team2Code = team2 ? (team2.fifa_code || team2.name_en?.substring(0, 3).toUpperCase()) : 'TBD';
                            
                            timeDiv.innerHTML = `
                                <div class="status">🔴 LIVE</div>
                                <div class="score">${team1Code} ${match.home_score} - ${match.away_score} ${team2Code}</div>
                            `;
                        } else {
                            // Upcoming match - show date/time on two compact lines
                            const parts = formatMatchTimeParts(match.local_date, match.stadium_id);
                            timeDiv.innerHTML = `
                                <div class="date">${parts.dateStr}</div>
                                <div class="time">${parts.timeStr}</div>
                            `;
                        }
                        
                        // Prevent overlapping labels on small screens.
                        // Neighbouring matches sit next to each other along the ring's
                        // tangent, so their labels are separated along the radial
                        // (perpendicular) direction instead of a fixed vertical offset.
                        // Alternating inward/outward across a couple of distances creates
                        // several concentric bands, so adjacent labels never sit at the
                        // same position regardless of where they are on the wheel.
                        const radialBands = [18, 38];
                        const radialMagnitude = radialBands[Math.floor(matchIdx / 2) % radialBands.length];
                        const radialDirection = (matchIdx % 2 === 0) ? -1 : 1; // inward vs outward
                        const radialOffset = radialMagnitude * radialDirection;

                        const labelX = mx + Math.cos(angleRad) * radialOffset;
                        const labelY = my + Math.sin(angleRad) * radialOffset;

                        timeDiv.style.left = labelX + 'px';
                        timeDiv.style.top = labelY + 'px';
                        timesContainer.appendChild(timeDiv);
                    }
                });
            });

            // Final pass: guarantee no two labels overlap by nudging them apart
            // vertically. The radial offset above is only a starting hint; this
            // measures the real rendered boxes and resolves any remaining
            // collisions (important on phones where the wheel is small).
            resolveLabelOverlaps(timesContainer);

            // Update the next game timer
            updateCanadaTimer();

            // Fill the centre with the champion (winner of the final), or an empty
            // "?" circle while the winner is still to be decided.
            updateChampion();
        }

        function updateChampion() {
            const el = document.getElementById('centerChampion');
            if (!el) return;

            const finalMatch = allMatches.find(m => m.type === 'final');
            let champion = null;
            if (finalMatch && finalMatch.finished === 'TRUE') {
                const homeWon = parseInt(finalMatch.home_score) > parseInt(finalMatch.away_score);
                const winnerId = homeWon ? finalMatch.home_team_id : finalMatch.away_team_id;
                champion = allTeams.find(t => t.id === winnerId) || null;
            }

            if (champion) {
                el.classList.add('decided');
                el.classList.remove('pending');
                el.title = `${champion.name_en} — Champion 🏆`;
                const code = champion.fifa_code || (champion.name_en || '').substring(0, 3).toUpperCase();
                const src = champion.flag || `https://flagcdn.com/w80/${(champion.iso2 || '').toLowerCase()}.png`;
                el.innerHTML = `<img src="${src}" alt="${champion.name_en}" onerror="this.parentNode.innerHTML='${code}'">`;
            } else {
                el.classList.add('pending');
                el.classList.remove('decided');
                el.title = 'Champion — to be decided';
                el.innerHTML = '<span class="champion-q">?</span>';
            }
        }

        function resolveLabelOverlaps(container, iterations = 20) {
            // Labels use transform: translate(-50%, -50%), so style.left/top is the
            // centre of each box. We read the rendered width/height, detect pairs
            // that overlap on both axes, and push them apart along the vertical
            // axis (adding an offset to the heights) until they no longer collide.
            const items = Array.from(container.children).map(el => ({
                el,
                x: parseFloat(el.style.left) || 0,
                y: parseFloat(el.style.top) || 0,
                w: el.offsetWidth || 40,
                h: el.offsetHeight || 18
            }));

            if (items.length < 2) return;

            const padY = 2; // minimum vertical gap between labels

            for (let iter = 0; iter < iterations; iter++) {
                let moved = false;

                for (let i = 0; i < items.length; i++) {
                    for (let j = i + 1; j < items.length; j++) {
                        const a = items[i];
                        const b = items[j];

                        const minDx = (a.w + b.w) / 2;
                        const minDy = (a.h + b.h) / 2 + padY;

                        const dx = Math.abs(a.x - b.x);
                        const dy = Math.abs(a.y - b.y);

                        // Only a real collision if the boxes overlap on both axes.
                        if (dx < minDx && dy < minDy) {
                            const push = (minDy - dy) / 2 + 0.5;

                            if (a.y <= b.y) {
                                a.y -= push;
                                b.y += push;
                            } else {
                                a.y += push;
                                b.y -= push;
                            }
                            moved = true;
                        }
                    }
                }

                if (!moved) break;
            }

            items.forEach(it => { it.el.style.top = it.y + 'px'; });
        }

        function drawLine(svg, x1, y1, x2, y2, active) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.classList.add('bracket-line');
            if (active) line.classList.add('active');
            svg.appendChild(line);
        }

        function createTBDFlag(container, label, x, y) {
            const flag = document.createElement('div');
            flag.className = 'team-flag tbd';
            flag.style.left = x + 'px';
            flag.style.top = y + 'px';
            flag.innerHTML = '<div style="font-size: 10px; font-weight: bold; opacity: 0.7;">?</div>';

            const text = label && label.trim() ? label : 'To be decided';
            flag.addEventListener('mouseenter', (e) => {
                const tooltip = document.getElementById('tooltip');
                tooltip.textContent = text;
                tooltip.style.display = 'block';
                tooltip.style.left = e.pageX + 15 + 'px';
                tooltip.style.top = e.pageY - 10 + 'px';
            });
            flag.addEventListener('mouseleave', () => {
                document.getElementById('tooltip').style.display = 'none';
            });

            container.appendChild(flag);
        }

        function createFlag(container, team, x, y, match, side) {
            const flag = document.createElement('div');
            flag.className = 'team-flag';
            flag.style.left = x + 'px';
            flag.style.top = y + 'px';

            // Check winner/loser
            if (match && match.finished === 'TRUE') {
                const homeWon = parseInt(match.home_score) > parseInt(match.away_score);
                const awayWon = parseInt(match.away_score) > parseInt(match.home_score);
                
                if ((side === 'home' && homeWon) || (side === 'away' && awayWon)) {
                    flag.classList.add('winner');
                } else {
                    flag.classList.add('eliminated');
                }
            }

            // Add flag image
            const img = document.createElement('img');
            img.src = team.flag || `https://flagcdn.com/w80/${team.iso2?.toLowerCase()}.png`;
            img.alt = team.name_en;
            img.onerror = function() {
                flag.innerHTML = `<div style="font-size: 11px; font-weight: bold;">${team.fifa_code || team.name_en?.substring(0, 3).toUpperCase()}</div>`;
            };
            flag.appendChild(img);

            // Tooltip
            flag.addEventListener('mouseenter', (e) => {
                const tooltip = document.getElementById('tooltip');
                tooltip.textContent = team.name_en;
                tooltip.style.display = 'block';
                tooltip.style.left = e.pageX + 15 + 'px';
                tooltip.style.top = e.pageY - 10 + 'px';
            });
            flag.addEventListener('mouseleave', () => {
                document.getElementById('tooltip').style.display = 'none';
            });

            container.appendChild(flag);
        }

        function refreshData() {
            const wheelVisible = document.getElementById('wheelContainer').style.display === 'block';
            // If cached data is already on screen, keep it visible and just refetch
            // in the background. Only fall back to the spinner when there's nothing
            // to show yet (e.g. the full error screen).
            if (!wheelVisible) {
                const loading = document.getElementById('loading');
                loading.innerHTML = '<div class="spinner"></div><div>Loading tournament data...</div>';
                loading.style.display = 'block';
            }
            fetchData();
        }

        // Initialize
        // Set the timezone selector to auto-detect by default
        const select = document.getElementById('timezoneSelect');
        const detectedTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        
        // Try to match detected timezone to a dropdown option
        const options = Array.from(select.querySelectorAll('option'));
        const matchingOption = options.find(opt => opt.value === detectedTimezone);
        
        if (matchingOption) {
            select.value = detectedTimezone;
            selectedTimezone = detectedTimezone;
        } else {
            select.value = 'auto';
            selectedTimezone = 'auto';
        }
        
        // Show cached data immediately (if any) so returning visitors see the wheel
        // right away instead of a spinner, then refresh in the background.
        const cachedOnLoad = loadCache();
        if (cachedOnLoad) {
            allMatches = cachedOnLoad.games;
            allTeams = cachedOnLoad.teams;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('wheelContainer').style.display = 'block';
            renderWheel();
        }

        // Pause polling while the tab is hidden (no point hammering the API when
        // nobody's looking); resume with an immediate refresh when it returns.
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearTimeout(pollTimeout);
            } else if (!isFetching) {
                fetchData();
            } else {
                // A fetch is already running; make sure the loop stays alive.
                scheduleNextPoll();
            }
        });

        // Kicks off the self-scheduling poll loop (backs off on failure).
        fetchData();
    </script>
</body>
</html>
